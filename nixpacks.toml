[phases.install]
cmds = [
  "echo 'DEBUG: Current working directory:'",
  "pwd",
  "echo 'DEBUG: Listing all files:'", 
  "ls -la",
  "echo 'DEBUG: Checking package.json:'",
  "test -f package.json && echo 'package.json EXISTS' || echo 'package.json NOT FOUND'",
  "echo 'DEBUG: Checking pnpm-lock.yaml:'",
  "test -f pnpm-lock.yaml && echo 'pnpm-lock.yaml EXISTS' || echo 'pnpm-lock.yaml NOT FOUND'",
  "echo 'DEBUG: package.json contents (first 10 lines):'",
  "head -10 package.json || echo 'FAILED to read package.json'",
  "echo 'DEBUG: Running pnpm install:'",
  "pnpm install"
]